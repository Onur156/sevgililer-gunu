<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Esma ❤️ Burak</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
    color: white;
    background: linear-gradient(270deg, #ff4d6d, #c77dff, #5f9cff);
    background-size: 600% 600%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

h1 { font-size: 32px; }

button {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    margin: 10px;
}

#yesBtn {
    background: linear-gradient(45deg, #ff4d6d, #ff85a1);
    color: white;
    box-shadow: 0 0 15px rgba(255, 77, 109, 0.7);
}

#yesBtn:hover {
    transform: scale(1.1);
}

#noBtn {
    background: white;
    color: #ff4d6d;
    position: absolute;
}

#message {
    margin-top: 20px;
    font-size: 18px;
}

.sparkle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
    animation: sparkleAnim linear infinite;
}

@keyframes sparkleAnim {
    from { transform: translateY(0); opacity:1; }
    to { transform: translateY(-800px); opacity:0; }
}
</style>
</head>

<body>

<!-- YouTube müzik -->
<iframe id="music"
width="0" height="0"
src="https://www.youtube.com/embed/rYJjgfCfBOU?autoplay=1&loop=1&playlist=rYJjgfCfBOU&start=100"
frameborder="0"
allow="autoplay">
</iframe>

<div class="container">
    <h1 id="question">Beni seviyor musun? ❤️</h1>

    <button id="yesBtn" onclick="nextStep()">Evet 💖</button>
    <button id="noBtn" onmouseover="moveButton()">Hayır 😏</button>

    <div id="message"></div>
</div>

<script>
let step = 0;

function nextStep() {
    step++;
    const q = document.getElementById("question");
    const m = document.getElementById("message");

    if (step === 1) q.innerText = "Çok mu seviyorsun? 😍";
    else if (step === 2) q.innerText = "Ne kadar çok seviyorsun? 💕";
    else if (step === 3) q.innerText = "Sonsuza dek benimle misin?";
    else if (step === 4) {
        q.style.display = "none";
        document.getElementById("yesBtn").style.display = "none";
        document.getElementById("noBtn").style.display = "none";

        m.innerHTML = `
        Esma ❤️<br><br>
        Seni anlatmak gerçekten kolay değil çünkü sen benim için çok özelsin.  
        Sen benim en güzel alışkanlığım, en huzurlu yerimsin.  
        Seninle geçen her an benim için çok değerli.  
        Gülüşün bile her şeyi güzelleştiriyor.  
        İyi ki varsın ve iyi ki benimlesin 💖
        `;
    }
}

/* Hayır butonu kaçıyor */
function moveButton() {
    const btn = document.getElementById("noBtn");
    btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
    btn.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

/* Parıltı */
function sparkle() {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.top = window.innerHeight + "px";
    s.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),5000);
}
setInterval(sparkle,150);

/* PWA */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
